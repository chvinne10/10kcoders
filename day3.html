<!DOCTYPE html>
<html>
<head>
    <title>Anchor with iFrame Example</title>
</head>
<body>

    <h2>Click links to open in iFrame</h2>

    
    <a href="https://www.wikipedia.org" target="myframe">Wikipedia</a><br><br>
    <a href="https://www.google.com" target="myframe">Google</a><br><br>
    <a href="https://www.github.com" target="myframe">GitHub</a><br><br>

    <!-- iFrame -->
    <iframe name="myframe" width="600" height="400" style="border:1px solid black;">
    </iframe>

</body>
</html>
