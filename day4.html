<!DOCTYPE html>
<html>
<head>
  <title>Update Information</title>
</head>
<body>

  <h1>Update Information</h1>
  <p>Use the form below to edit your information.</p>

  <form>

    <!-- First Name -->
    <label>First name:</label>
    <input type="text" value="Bruce"><br><br>

    <!-- Last Name -->
    <label>Last name:</label>
    <input type="text" value="Phillips"><br><br>

    <!-- Favorite Sport (Dropdown) -->
    <label>Favorite sport:</label>
    <select>
      <option>basketball</option>
      <option>cricket</option>
      <option>football</option>
    </select><br><br>

    <!-- Gender (Radio Buttons) -->
    <label>Gender:</label>
    <input type="radio" name="gender"> male
    <input type="radio" name="gender"> female
    <input type="radio" name="gender" checked> not sure
    <br><br>

    <!-- State (Dropdown) -->
    <label>State resident:</label>
    <select>
      <option>Kansas</option>
      <option>California</option>
      <option>Texas</option>
    </select><br><br>
    
    <!-- Age Checkbox -->
    <input type="checkbox" checked> 21 or older
    <br><br>

    <!-- Car Models (Multiple Checkboxes) -->
    <label>Car models owned:</label><br>
    <input type="checkbox" checked> Ford
    <input type="checkbox"> Chrysler
    <input type="checkbox"> Toyota
    <input type="checkbox" checked> Nissan
    <br><br>

    <!-- Submit Button -->
    <input type="submit" value="Save Changes">

  </form>

</body>
</html>
